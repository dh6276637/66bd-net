# configuration file /etc/nginx/conf.d/dongshushu-paper.conf:
# HTTP to HTTPS redirect
server {
    listen 80;
    server_name www.66bd.net 66bd.net;
    return 301 https://www.66bd.net$request_uri;
}

# HTTPS server
server {
    listen 443 ssl http2;
    server_name www.66bd.net 66bd.net;

    ssl_certificate /etc/letsencrypt/live/www.66bd.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.66bd.net/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    add_header Strict-Transport-Security "max-age=63072000" always;

    location /static/ {
        alias /var/www/dongshushu-paper/static/;
        expires 30d;
        valid_referers none blocked server_names;
        if ($invalid_referer) {
            return 403;
        }
    }

    location /.well-known/acme-challenge/ {
        root /var/www/dongshushu-paper;
    }

    location /api/ {
        limit_req zone=api burst=10 nodelay;
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

