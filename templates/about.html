<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>关于我们</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
            color: #333;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .header {
            text-align: center;
            color: #fff;
            margin-bottom: 40px;
        }
        .logo { font-size: 48px; margin-bottom: 10px; }
        .title { font-size: 32px; font-weight: 700; margin-bottom: 10px; }
        .subtitle { opacity: 0.9; font-size: 18px; }
        .card {
            background: #fff;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .card h2 {
            font-size: 20px;
            color: #667eea;
            margin: 25px 0 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }
        .card h2:first-child { margin-top: 0; }
        .card p { line-height: 1.8; color: #555; margin-bottom: 15px; }
        .card ul { margin: 15px 0; padding-left: 25px; }
        .card li { line-height: 2; color: #555; }
        .card a { color: #667eea; text-decoration: none; }
        .card a:hover { text-decoration: underline; }
        .contact-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            margin-top: 25px;
        }
        .contact-box h3 { margin-bottom: 15px; font-size: 18px; }
        .contact-box a { color: #fff; font-size: 20px; font-weight: 600; }
        .footer {
            text-align: center;
            margin-top: 30px;
            color: rgba(255,255,255,0.7);
            font-size: 14px;
        }
        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            padding: 10px 20px;
            background: rgba(255,255,255,0.2);
            color: #fff;
            border-radius: 25px;
            text-decoration: none;
            transition: all 0.3s;
        }
        .back-btn:hover { background: rgba(255,255,255,0.3); color: #fff; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-btn">← 返回首页</a>
        <div class="header">
            <div class="logo">📖</div>
            <div class="title">66必读</div>
            <div class="subtitle">每日精选 · 技术资讯聚合平台</div>
        </div>
        <div class="card">
            {{ about_content|safe if about_content else '' }}
            
            <div class="contact-box">
                <h3>📧 联系我们</h3>
                <p style="color:rgba(255,255,255,0.9);margin-bottom:10px;">如有问题或建议，欢迎通过邮箱联系我们：</p>
                <a href="mailto:{{ contact_email }}">{{ contact_email }}</a>
            </div>
            
            <h2>🔒 隐私政策</h2>
            <p>我们非常重视用户隐私保护。当您访问本站时，我们可能会收集部分匿名访问数据用于统计分析。我们不会收集或泄露您的个人隐私信息。</p>
            <p>如有任何疑问，请通过上述联系方式与我们联系。</p>
        </div>
        <div class="footer">
            © 2024 66必读 · 专注科技资讯
        </div>
    </div>
</body>
</html>
