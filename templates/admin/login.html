<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 66必读管理后台</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/admin_new.css">
    <style>
        body { background: var(--bg-page); }
        .login-container { background: linear-gradient(135deg, #409EFF 0%, #3078c6 100%); }
        .login-box { width: 420px; padding: 50px 40px; }
        .login-logo { font-size: 28px; font-weight: 700; color: var(--primary); text-align: center; margin-bottom: 10px; }
        .login-subtitle { text-align: center; color: var(--text-secondary); margin-bottom: 30px; font-size: 14px; }
        .login-error { background: rgba(245, 108, 108, 0.1); color: var(--danger); padding: 12px 15px; border-radius: 4px; margin-bottom: 20px; font-size: 14px; border: 1px solid var(--danger); }
        .btn-login { width: 100%; padding: 12px; font-size: 16px; margin-top: 10px; }
    </style>

    <style>
        /* 移动端菜单按钮（如果模板没有） */
        .mobile-menu-btn {
            display: none;
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 1001;
            width: 44px;
            height: 44px;
            background: var(--bg-card);
            border-radius: var(--radius);
            box-shadow: var(--shadow-md);
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
        }

        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
        }

        .sidebar-overlay.active {
            display: block;
        }

        @media (max-width: 768px) {
            .mobile-menu-btn {
                display: flex;
            }

            .admin-sidebar {
                transform: translateX(-100%);
            }

            .admin-sidebar.open {
                transform: translateX(0);
            }

            .admin-main {
                margin-left: 0 !important;
            }
        }
    </style>

</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-logo">📖 66必读</div>
            <div class="login-subtitle">管理后台登录</div>
            {% with messages = get_flashed_messages() %}
            {% for msg in messages %}
            <div class="login-error">{{ msg }}</div>
            {% endfor %}
            {% endwith %}
            <form method="post">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                <div class="form-group">
                    <label class="form-label">用户名</label>
                    <input type="text" name="username" class="form-control" placeholder="请输入用户名" required autofocus>
                </div>
                <div class="form-group">
                    <label class="form-label">密码</label>
                    <input type="password" name="password" class="form-control" placeholder="请输入密码" required>
                </div>
                <button type="submit" class="btn btn-primary btn-login">登 录</button>
            </form>
        </div>
    </div>

    <script>
        function toggleSidebar() {
            const sidebar = document.querySelector('.admin-sidebar');
            const overlay = document.querySelector('.sidebar-overlay');
            if (sidebar) sidebar.classList.toggle('open');
            if (overlay) overlay.classList.toggle('active');
        }

        function handleResize() {
            if (window.innerWidth > 768) {
                const sidebar = document.querySelector('.admin-sidebar');
                const overlay = document.querySelector('.sidebar-overlay');
                if (sidebar) sidebar.classList.remove('open');
                if (overlay) overlay.classList.remove('active');
            }
        }

        window.addEventListener('resize', handleResize);
        document.addEventListener('DOMContentLoaded', handleResize);
    </script>

</body>
</html>
