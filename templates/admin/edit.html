<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ '编辑文章' if article else '发布文章' }} - 66必读管理后台</title>
    <link rel="stylesheet" href="/static/css/admin_new.css">
    <style>
        .editor-toolbar { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .editor-toolbar button { padding: 8px 16px; border: 1px solid var(--border); background: #fff; border-radius: 4px; cursor: pointer; }
        .editor-toolbar button:hover { border-color: var(--primary); color: var(--primary); }
        .editor-toolbar button.active { background: var(--primary); color: #fff; border-color: var(--primary); }
        textarea#content { font-family: 'Monaco', 'Menlo', monospace; font-size: 13px; line-height: 1.6; }
    </style>

    <style>
        /* 移动端菜单按钮（如果模板没有） */
        .mobile-menu-btn {
            display: none;
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 1001;
            width: 44px;
            height: 44px;
            background: var(--bg-card);
            border-radius: var(--radius);
            box-shadow: var(--shadow-md);
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
        }

        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
        }

        .sidebar-overlay.active {
            display: block;
        }

        @media (max-width: 768px) {
            .mobile-menu-btn {
                display: flex;
            }

            .admin-sidebar {
                transform: translateX(-100%);
            }

            .admin-sidebar.open {
                transform: translateX(0);
            }

            .admin-main {
                margin-left: 0 !important;
            }
        }
    </style>

</head>
<body>
    <div class="admin-layout">
        <aside class="sidebar">
            <div class="sidebar-header"><div class="sidebar-logo">📖 66必读</div></div>
            <nav class="sidebar-nav">
                <a href="/admin/" class="nav-item"><span class="nav-icon">📊</span><span class="nav-text">数据看板</span></a>
                <a href="/admin/articles" class="nav-item"><span class="nav-icon">📝</span><span class="nav-text">文章管理</span></a>
                <a href="/admin/articles/new" class="nav-item active"><span class="nav-icon">➕</span><span class="nav-text">发布文章</span></a>
                <a href="/admin/categories" class="nav-item"><span class="nav-icon">📂</span><span class="nav-text">分类管理</span></a>
                <a href="/admin/cron-log" class="nav-item"><span class="nav-icon">📜</span><span class="nav-text">采集日志</span></a>
                <a href="/admin/update" class="nav-item"><span class="nav-icon">🔄</span><span class="nav-text">在线更新</span></a>
                <a href="/admin/ai" class="nav-item"><span class="nav-icon">🤖</span><span class="nav-text">AI中心</span></a>
                <a href="/admin/ai/classify" class="nav-item"><span class="nav-icon">🏷️</span><span class="nav-text">智能分类</span></a>
                <a href="/admin/ai/tags" class="nav-item"><span class="nav-icon">🏷️</span><span class="nav-text">自动标签</span></a>
                <a href="/admin/ai/recommend" class="nav-item"><span class="nav-icon">📊</span><span class="nav-text">推荐分析</span></a>
                <a href="/admin/settings" class="nav-item"><span class="nav-icon">⚙️</span><span class="nav-text">站点设置</span></a>
                <a href="/admin/monitor" class="nav-item"><span class="nav-icon">📈</span><span class="nav-text">服务器监控</span></a>
                <a href="/admin/users" class="nav-item"><span class="nav-icon">👥</span><span class="nav-text">用户管理</span></a>
                <a href="/" class="nav-item"><span class="nav-icon">👀</span><span class="nav-text">查看网站</span></a>
            </nav>
        </aside>
        <main class="main-content">
            <div class="page-header">
                <h1 class="page-title">{{ '编辑文章' if article else '发布文章' }}</h1>
                <a href="/admin/articles" class="btn btn-outline">← 返回列表</a>
            </div>
            
            {% with messages = get_flashed_messages() %}
            {% if messages %}
            {% for msg in messages %}
            <div class="flash flash-success">{{ msg }}</div>
            {% endfor %}
            {% endif %}
            {% endwith %}
            
            <div class="card" style="margin-bottom: 24px;">
                <form method="post">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                    <div class="form-group">
                        <label class="form-label">原文标题</label>
                        <input type="text" name="title" class="form-control" value="{{ article.title if article else '' }}" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">中文标题</label>
                        <input type="text" name="title_cn" class="form-control" value="{{ article.title_cn if article else '' }}" placeholder="可留空，自动翻译">
                    </div>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
                        <div class="form-group">
                            <label class="form-label">分类</label>
                            <select name="category" class="form-control" required>
                                {% for cat in categories %}
                                <option value="{{ cat }}" {% if article and article.category == cat %}selected{% endif %}>{{ cat }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">来源</label>
                            <input type="text" name="source" class="form-control" value="{{ article.source if article else '' }}">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">原文链接</label>
                        <input type="url" name="source_url" class="form-control" value="{{ article.source_url if article else '' }}">
                    </div>
                    <div class="form-group">
                        <label class="form-label required">内容</label>
                        <textarea id="content" name="content" class="form-control" style="min-height:400px;font-family:monospace;">{{ article.content if article else '' }}</textarea>
                    </div>
                    <div style="display:flex;gap:15px;align-items:center;">
                        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
                            <input type="checkbox" name="is_published" value="1" {% if article and article.is_published %}checked{% endif %}>
                            <span>立即发布</span>
                        </label>
                        <button type="submit" class="btn btn-primary">{{ '保存修改' if article else '发布文章' }}</button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script>
        function toggleSidebar() {
            const sidebar = document.querySelector('.admin-sidebar');
            const overlay = document.querySelector('.sidebar-overlay');
            if (sidebar) sidebar.classList.toggle('open');
            if (overlay) overlay.classList.toggle('active');
        }

        function handleResize() {
            if (window.innerWidth > 768) {
                const sidebar = document.querySelector('.admin-sidebar');
                const overlay = document.querySelector('.sidebar-overlay');
                if (sidebar) sidebar.classList.remove('open');
                if (overlay) overlay.classList.remove('active');
            }
        }

        window.addEventListener('resize', handleResize);
        document.addEventListener('DOMContentLoaded', handleResize);
    </script>

</body>
</html>
