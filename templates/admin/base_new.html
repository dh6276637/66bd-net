<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}66必读管理后台{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/admin_new.css">
    <style>
        {% block page_style %}{% endblock %}
    </style>
</head>
<body>
    <!-- 移动端菜单按钮 -->
    <button class="mobile-menu-btn" onclick="toggleSidebar()">☰</button>

    <!-- 侧边栏遮罩 -->
    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>

    <div class="admin-layout">
        <!-- 侧边栏 -->
        <aside class="admin-sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <div class="sidebar-logo-icon">📖</div>
                    <span>66必读</span>
                </div>
            </div>

            <nav class="sidebar-nav">
                <div class="nav-section">
                    <div class="nav-section-title">主要内容</div>
                    <a href="/admin/" class="nav-item {% if request.path == '/admin/' %}active{% endif %}">
                        <span class="nav-icon">📊</span>
                        <span class="nav-text">数据看板</span>
                    </a>
                    <a href="/admin/articles" class="nav-item {% if '/admin/articles' in request.path and '/admin/articles/new' not in request.path %}active{% endif %}">
                        <span class="nav-icon">📝</span>
                        <span class="nav-text">文章管理</span>
                    </a>
                    <a href="/admin/articles/new" class="nav-item {% if '/admin/articles/new' in request.path %}active{% endif %}">
                        <span class="nav-icon">➕</span>
                        <span class="nav-text">发布文章</span>
                    </a>
                    <a href="/admin/categories" class="nav-item {% if '/admin/categories' in request.path %}active{% endif %}">
                        <span class="nav-icon">📂</span>
                        <span class="nav-text">分类管理</span>
                    </a>
                </div>

                <div class="nav-section">
                    <div class="nav-section-title">数据监控</div>
                    <a href="/admin/action-log" class="nav-item {% if '/admin/action-log' in request.path %}active{% endif %}">
                        <span class="nav-icon">📋</span>
                        <span class="nav-text">操作日志</span>
                    </a>
                    <a href="/admin/cron-log" class="nav-item {% if '/admin/cron-log' in request.path %}active{% endif %}">
                        <span class="nav-icon">📜</span>
                        <span class="nav-text">采集日志</span>
                    </a>
                    <a href="/admin/update" class="nav-item {% if '/admin/update' in request.path %}active{% endif %}">
                        <span class="nav-icon">🔄</span>
                        <span class="nav-text">在线更新</span>
                    </a>
                </div>

                <div class="nav-section">
                    <div class="nav-section-title">系统设置</div>
                    <a href="/admin/settings" class="nav-item {% if '/admin/settings' in request.path %}active{% endif %}">
                        <span class="nav-icon">⚙️</span>
                        <span class="nav-text">站点设置</span>
                    </a>
                    <a href="/admin/monitor" class="nav-item {% if '/admin/monitor' in request.path %}active{% endif %}">
                        <span class="nav-icon">📈</span>
                        <span class="nav-text">服务器监控</span>
                    </a>
                    <a href="/admin/users" class="nav-item {% if '/admin/users' in request.path %}active{% endif %}">
                        <span class="nav-icon">👥</span>
                        <span class="nav-text">用户管理</span>
                    </a>
                </div>

                <div class="nav-section">
                    <div class="nav-section-title">快捷访问</div>
                    <a href="/" class="nav-item" target="_blank">
                        <span class="nav-icon">👀</span>
                        <span class="nav-text">查看网站</span>
                    </a>
                    <a href="/admin/logout" class="nav-item">
                        <span class="nav-icon">🚪</span>
                        <span class="nav-text">退出登录</span>
                    </a>
                </div>
            </nav>

            <div class="sidebar-footer">
                <div class="sidebar-user">
                    <div class="user-avatar">A</div>
                    <div class="user-info">
                        <div class="user-name">管理员</div>
                        <div class="user-role">超级管理员</div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="admin-main">
            <header class="admin-header">
                <div class="header-left">
                    <h1 class="page-title">{% block page_title %}页面标题{% endblock %}</h1>
                </div>
                <div class="header-right">
                    <div class="header-actions">
                        {% block header_actions %}{% endblock %}
                    </div>
                </div>
            </header>

            <div class="admin-content">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.querySelector('.sidebar-overlay');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('active');
        }

        function handleResize() {
            if (window.innerWidth > 768) {
                document.getElementById('sidebar').classList.remove('open');
                document.querySelector('.sidebar-overlay').classList.remove('active');
            }
        }

        window.addEventListener('resize', handleResize);
        document.addEventListener('DOMContentLoaded', handleResize);

        {% block page_script %}{% endblock %}
    </script>

    {% block extra_scripts %}{% endblock %}
</body>
</html>
