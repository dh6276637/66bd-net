<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>采集日志 - 66必读管理后台</title>
    <link rel="stylesheet" href="/static/css/admin_new.css">
    <style>
        .log-list { font-family: 'Monaco', 'Menlo', monospace; font-size: 13px; line-height: 1.8; }
        .log-item { padding: 8px 15px; border-left: 3px solid transparent; }
        .log-item:hover { background: var(--bg-page); }
        .log-info { border-left-color: var(--primary); }
        .log-success { border-left-color: var(--success); }
        .log-warning { border-left-color: var(--warning); }
        .log-error { border-left-color: var(--danger); }
        .log-time { color: var(--text-secondary); margin-right: 10px; }
    </style>

    <style>
        /* 移动端菜单按钮（如果模板没有） */
        .mobile-menu-btn {
            display: none;
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 1001;
            width: 44px;
            height: 44px;
            background: var(--bg-card);
            border-radius: var(--radius);
            box-shadow: var(--shadow-md);
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
        }

        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
        }

        .sidebar-overlay.active {
            display: block;
        }

        @media (max-width: 768px) {
            .mobile-menu-btn {
                display: flex;
            }

            .admin-sidebar {
                transform: translateX(-100%);
            }

            .admin-sidebar.open {
                transform: translateX(0);
            }

            .admin-main {
                margin-left: 0 !important;
            }
        }
    </style>

</head>
<body>
    <!-- 移动端菜单按钮 -->
    <button class="mobile-menu-btn" onclick="toggleSidebar()">☰</button>

    <!-- 侧边栏遮罩 -->
    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>

    <div class="admin-layout">
        <aside class="sidebar">
            <div class="sidebar-header"><div class="sidebar-logo">📖 66必读</div></div>
            <nav class="sidebar-nav">
                <a href="/admin/" class="nav-item"><span class="nav-icon">📊</span><span class="nav-text">数据看板</span></a>
                <a href="/admin/articles" class="nav-item"><span class="nav-icon">📝</span><span class="nav-text">文章管理</span></a>
                <a href="/admin/articles/new" class="nav-item"><span class="nav-icon">➕</span><span class="nav-text">发布文章</span></a>
                <a href="/admin/categories" class="nav-item"><span class="nav-icon">📂</span><span class="nav-text">分类管理</span></a>
                <a href="/admin/action-log" class="nav-item"><span class="nav-icon">📋</span><span class="nav-text">操作日志</span></a>
                <a href="/admin/cron-log" class="nav-item active"><span class="nav-icon">📜</span><span class="nav-text">采集日志</span></a>
                <a href="/admin/update" class="nav-item"><span class="nav-icon">🔄</span><span class="nav-text">在线更新</span></a>
                <a href="/admin/ai/control" class="nav-item"><span class="nav-icon">🎮</span><span class="nav-text">AI操控控制台</span></a>
                    <a href="/admin/ai" class="nav-item"><span class="nav-icon">🤖</span><span class="nav-text">AI中心</span></a>
                <a href="/admin/ai/classify" class="nav-item"><span class="nav-icon">🏷️</span><span class="nav-text">智能分类</span></a>
                <a href="/admin/ai/tags" class="nav-item"><span class="nav-icon">🏷️</span><span class="nav-text">自动标签</span></a>
                <a href="/admin/ai/recommend" class="nav-item"><span class="nav-icon">📊</span><span class="nav-text">推荐分析</span></a>
                <a href="/admin/settings" class="nav-item"><span class="nav-icon">⚙️</span><span class="nav-text">站点设置</span></a>
                <a href="/admin/monitor" class="nav-item"><span class="nav-icon">📈</span><span class="nav-text">服务器监控</span></a>
                <a href="/admin/users" class="nav-item"><span class="nav-icon">👥</span><span class="nav-text">用户管理</span></a>
                <a href="/" class="nav-item"><span class="nav-icon">👀</span><span class="nav-text">查看网站</span></a>
            </nav>
        </aside>
        <main class="main-content">
            <div class="page-header">
                <h1 class="page-title">采集日志</h1>
                <div style="display:flex;gap:10px;">
                    <button class="btn btn-primary" onclick="fetch('/admin/cron/trigger',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({csrf_token:document.querySelector('[name=csrf_token]')?.value||''})}).then(r=>r.json()).then(d=>alert(d.message||d.error||'已触发')).catch(e=>alert('触发失败'))">🔄 触发采集</button>
                    <button onclick="location.reload()" class="btn btn-outline">🔃 刷新</button>
                </div>
            </div>
            
            <div class="card" style="margin-bottom: 24px;">
                <div class="card-header">
                    <span class="card-title">📜 最近200条日志</span>
                </div>
                <div class="log-list" style="max-height:600px;overflow-y:auto;">
                    {% for log in logs %}
                    <div class="log-item {% if 'ERROR' in log or '失败' in log %}log-error{% elif '成功' in log or '完成' in log %}log-success{% elif '警告' in log or '跳过' in log %}log-warning{% else %}log-info{% endif %}">
                        {{ log }}
                    </div>
                    {% else %}
                    <div style="text-align:center;padding:40px;color:var(--text-secondary);">暂无日志</div>
                    {% endfor %}
                </div>
            </div>
        </main>
    </div>

    <script>
        function toggleSidebar() {
            const sidebar = document.querySelector('.admin-sidebar');
            const overlay = document.querySelector('.sidebar-overlay');
            if (sidebar) sidebar.classList.toggle('open');
            if (overlay) overlay.classList.toggle('active');
        }

        function handleResize() {
            if (window.innerWidth > 768px) {
                const sidebar = document.querySelector('.admin-sidebar');
                const overlay = document.querySelector('.sidebar-overlay');
                if (sidebar) sidebar.classList.remove('open');
                if (overlay) overlay.classList.remove('active');
            }
        }

        window.addEventListener('resize', handleResize);
        document.addEventListener('DOMContentLoaded', handleResize);
    </script>

</body>
</html>
